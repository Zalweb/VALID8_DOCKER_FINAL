services:
  - type: web
    name: valid8-backend
    env: docker
    region: singapore
    plan: free
    dockerfilePath: ./Backend/Dockerfile
    dockerContext: ./Backend
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: valid8-db
          property: connectionString
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: web
    name: valid8-frontend
    runtime: static
    buildCommand: cd Frontend && npm ci && npm run build
    staticPublishPath: ./Frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false

databases:
  - name: valid8-db
    databaseName: fastapi_db
    user: valid8_user
