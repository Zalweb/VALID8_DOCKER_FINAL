services:
  - type: web
    name: valid8-backend
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./Backend/Dockerfile
    dockerContext: ./Backend
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: valid8-db
          property: connectionString
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: CORS_ALLOW_ORIGINS
        value: "*"

  - type: web
    name: valid8-frontend
    runtime: static
    region: singapore
    buildCommand: cd Frontend && npm ci && npx vite build
    staticPublishPath: Frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: valid8-backend
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: valid8-db
    databaseName: fastapi_db
    region: singapore
    plan: free
